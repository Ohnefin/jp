<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inveniam</title>
    <style>
        :root {
            /* Un negro ligeramente menos puro para evitar fatiga visual */
            --bg-color: #080808; 
            /* Un blanco roto/gris muy claro para el texto */
            --text-color: #e0e0e0;
            /* Gris oscuro para la línea decorativa */
            --accent-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fuente monoespaciada limpia */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            /* Evita el cursor de selección de texto para mantener estética */
            cursor: default;
        }

        .content {
            text-align: center;
            padding: 20px;
            /* Animación de entrada: suave, una sola vez */
            animation: fadeInOnce 1.5s ease-out forwards;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 100;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin: 0;
            /* Nitidez máxima una vez cargada */
            opacity: 1;
            user-select: none;
        }

        .line {
            height: 1px;
            width: 80px; /* Ancho fijo */
            background-color: var(--accent-color);
            margin: 25px auto 0 auto;
        }

        /* Definición de la única animación de entrada */
        @keyframes fadeInOnce {
            0% { 
                opacity: 0; 
                transform: translateY(5px); /* Pequeño desplazamiento hacia arriba */
            }
            100% { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        /* Responsive para móviles */
        @media (max-width: 600px) {
            h1 { 
                font-size: 0.9rem; 
                letter-spacing: 0.25em; 
            }
            .line {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Aut viam inveniam aut faciam</h1>
        <div class="line"></div>
    </div>
</body>
</html>
